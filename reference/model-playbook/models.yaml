future_candidates:
  gemini-3-1-flash-lite:
    provider: google
    full_id: google/gemini-3.1-flash-lite-preview
    released: 2026-03-03
    why: "High-volume low-latency Gemini variant. Matches 2.5 Flash quality at lower cost. Useful for cheap Gemini-family work."

  gpt-5-4-pro:
    provider: openai
    full_id: openai/gpt-5.4-pro
    released: 2026-03-05
    why: "Premium GPT-5.4 for hardest reasoning ($30/$180). Reserve for cases where standard GPT-5.4 fails twice."

  qwen-3-5-plus:
    provider: alibaba
    full_id: qwen/qwen3.5-plus
    released: 2026-02
    why: "Top open-weight for broad use. 397B MoE, 1M context, ~$0.40/$1.20 per M. Laptop-runnable variants."

  deepseek-v3-2:
    provider: deepseek
    full_id: deepseek/deepseek-v3.2
    released: 2026
    why: "Strongest open-weight reasoning. $0.32/$0.89 per M. Competitive with closed models on GPQA/AIME."

  grok-4-20:
    provider: x-ai
    full_id: x-ai/grok-4.20
    released: 2026-02
    why: "Leads SWE-Bench (~75%). Real-time data access. Weaker on novel reasoning (ARC-AGI-2). Consider if you want xAI exposure in the stack."

